name: Trigger release tweet

on:
  release:
    types: [published]

jobs:
  trigger:
    # Skip when the release body is empty — auto-release.yml emits "" if
    # axon-dev had no cli/ commits in the window, in which case marketing
    # would otherwise fall back to axon-cli git log (only chore syncs +
    # ci commits, never useful).
    if: ${{ github.event.release.body != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger axon-marketing tweet workflow
        env:
          GH_TOKEN: ${{ secrets.MARKETING_PAT }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_NOTES: ${{ github.event.release.body }}
        run: |
          gh workflow run x-release-post.yml \
            --repo axon-work/axon-marketing \
            --field tag="$TAG" \
            --field release_notes="$RELEASE_NOTES" \
            --field dry_run=false
